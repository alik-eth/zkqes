# Tanstack Router SPA fallback — every unknown path serves index.html
# so client-side routing can render the right route. Without this,
# `https://zkqes.org/ua/cli` reloaded directly would 404.
#
# The /assets/ path stays as-is (real files with content-hash names);
# everything else falls through to index.html.

# ceremony.zkqes.org default-route rewrite.
#
# Same Fly app serves zkqes.org + ceremony.zkqes.org from the same
# `VITE_TARGET=landing` dist (the bundle already includes /ceremony/*
# routes). On the marketing apex this is fine — `/` is the landing
# hero. On the ceremony subdomain we want `/` to resolve to /ceremony
# so a visitor typing ceremony.zkqes.org lands where they intended,
# not on the hero.
#
# `try_files` doesn't see Host so we can't do this in the main
# location {} block — we split on host with a `map` and a separate
# server block.
map $http_host $is_ceremony_host {
    default 0;
    "ceremony.zkqes.org" 1;
}

# Apex + ceremony share dist; ceremony rewrites bare-/ requests to
# /ceremony before the SPA fallback fires. Direct navigation to e.g.
# ceremony.zkqes.org/ua/cli still serves /ua/cli — only the bare
# root path gets rewritten.
server {
    listen 8080 default_server;
    listen [::]:8080 default_server;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # `port_in_redirect off` strips the internal :8080 from any
    # Location header nginx generates. `absolute_redirect off` makes
    # redirects relative — the browser then prepends the original
    # scheme + host, which Fly's edge proxy preserves as https://
    # ceremony.zkqes.org. Without these two, nginx leaks the
    # internal-port/scheme pair into the redirect target.
    port_in_redirect off;
    absolute_redirect off;

    # ceremony.zkqes.org/  →  302 /ceremony.
    # Combined map gates the redirect on host AND request_uri="/" so
    # only bare-root requests redirect; /ceremony, /ceremony/contribute,
    # /assets/*, etc. pass through to the SPA / try_files normally.
    # Without the request_uri check the redirect fires recursively.
    set $redirect_to_ceremony 0;
    if ($is_ceremony_host = 1) {
        set $redirect_to_ceremony 1;
    }
    if ($request_uri != "/") {
        set $redirect_to_ceremony 0;
    }
    if ($redirect_to_ceremony = 1) {
        return 302 /ceremony;
    }

    # Long-cache the immutable hashed assets (Vite emits content-hash
    # filenames so any cache-busting drops out automatically).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Short-cache index.html so Vite-emitted asset URL drift propagates
    # quickly. The actual asset URLs inside index.html are content-
    # hashed; the SHELL document is the only piece that changes
    # between deploys.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # SPA fallback. Everything that isn't a real file is a Tanstack
    # Router route → serve index.html and let the SPA handle it.
    # SPA fallback. Drop the `$uri/` directory-probe step — TanStack
    # Router routes are virtual (no real /ceremony directory exists),
    # and nginx's directory probe with `autoindex off` yields a 403
    # for what should be a clean SPA-handled path.
    location / {
        try_files $uri /index.html;
    }

    # Disable directory listing — defense-in-depth against accidentally
    # surfacing a fixtures/ tree.
    autoindex off;

    # GZIP — Fly's edge already does compression for HTTPS clients but
    # serving compressed-on-disk to the proxy keeps origin bandwidth
    # low. Skip already-compressed types.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Don't leak nginx version in the Server header — minor but cheap.
    server_tokens off;
}
