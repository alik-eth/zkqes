# Fly.io app config — zkqes app surface (register flow + rotate).
#
# Serves the VITE_TARGET=app SPA at:
#
#   https://app.zkqes.org
#
# Sister apps:
#   zkqes-landing  → zkqes.org / ceremony.zkqes.org  (landing target)
#
# Cost posture matches landing — auto-stop, no always-on machine.
# Cold-start matters more here than on the landing (the user is in
# the middle of a register flow, not just glancing at marketing copy)
# so once Sepolia E2E §9.4 closes and real registration traffic lands,
# bump min_machines_running to 1 (~$2/mo).

app = "zkqes-app"
primary_region = "fra"

# NOTE: no [build] section — see deploy/landing/fly.toml comment.
# Dockerfile path passed via --dockerfile CLI flag at deploy time.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"

[[services.tcp_checks]]
  interval     = "15s"
  timeout      = "2s"
  grace_period = "5s"
  port         = 8080
