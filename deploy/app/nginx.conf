# SPA fallback for the app.zkqes.org register flow. Same shape as
# deploy/landing/nginx.conf — every Tanstack Router route lives in
# the SPA, so unknown paths must serve index.html.
#
# Extra header: COOP/COEP for the snarkjs Web Worker prove path.
# Without isolated cross-origin context, SharedArrayBuffer is
# unavailable and Web Worker prove falls back to the slow main-thread
# path. The headers are no-ops on the landing surface (no SAB usage)
# so they live only in the app config.

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cross-origin isolation — required for SharedArrayBuffer in the
    # snarkjs Web Worker. Without these headers the prover falls back
    # to a 4× slower path.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Long-cache hashed assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Asset responses must also carry COEP-allowed CORP, otherwise
        # the cross-origin-isolation context drops them.
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri =404;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    autoindex off;

    gzip on;
    gzip_types text/css application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    server_tokens off;
}
