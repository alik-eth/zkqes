# GitHub Pages deploy → docs.zkqes.org.
#
# Founder direction 2026-05-05: only docs on GH Pages. Landing, app,
# and ceremony surfaces move to Fly.io (see .github/workflows/fly-
# deploy.yml + deploy/{landing,app}/). GH Pages serves ONE custom
# domain per repo; that slot now belongs to docs.
#
# Pre-2026-05-05 history: this workflow used to deploy
# VITE_TARGET=landing → zkqes.org. The landing build moved to Fly
# (deploy/landing/) so the GH Pages slot was reclaimed for docs.
# The old `pages-docs.yml` published to a `gh-pages-docs` branch as
# a workaround for "two custom domains, one repo"; that branch is
# now obsolete and the workflow file was deleted in the same commit
# that introduced this repurposed pages.yml.

name: Deploy docs to docs.zkqes.org

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'BRAND.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.x
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build VitePress site
        run: pnpm docs:build

      - name: Write CNAME (docs.zkqes.org)
        # Per BRAND.md §Domains. The CNAME file tells GH Pages to
        # serve the deployed artifact with `Host: docs.zkqes.org` +
        # provision a Let's Encrypt cert for that subdomain.
        run: echo "docs.zkqes.org" > docs/.vitepress/dist/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
