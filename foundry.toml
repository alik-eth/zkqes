[profile.default]
src = "packages/contracts/src"
out = "packages/contracts/out"
test = "packages/contracts/test"
script = "packages/contracts/script"
cache_path = "packages/contracts/cache"
libs = ["packages/contracts/lib"]
remappings = [
  "forge-std/=packages/contracts/lib/forge-std/src/",
  "openzeppelin-contracts/=packages/contracts/lib/openzeppelin-contracts/contracts/",
  "@zkqes/contracts-sdk/=packages/contracts-sdk/src/",
]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [
  { access = "read",       path = "./packages/contracts/test/fixtures" },
  { access = "read-write", path = "./packages/contracts/test/fixtures/snapshots" },
  { access = "read-write", path = "./packages/web/tests/fixtures" },
]

[profile.ci]
verbosity = 3
fuzz = { runs = 256 }

[profile.base-sepolia]
# Inherits everything from [profile.default]; identical compiler + fs_permissions.
# Used by V5 Forge tests + DeployV5.s.sol when running against Base Sepolia
# (chainId 84532), which is the V5 architecture's locked target chain
# because EIP-7212 (the P-256 precompile at 0x100) is live there.

[rpc_endpoints]
base-sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base-sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
