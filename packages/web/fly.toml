# Fly.io config for the zkqes static SPA.
# Production domain: app.zkqes.org (attached out-of-band via `flyctl certs add`
# once DNS records are pointed at this app's dedicated IPs).

app = "zkqes-app"
primary_region = "ams"

[build]
  [build.args]
    VITE_CHAIN = "sepolia"
    # Vite inlines VITE_* at build time. WalletConnect projectIds are public
    # (every WC-enabled dapp ships theirs in the JS bundle), so committing
    # this string is fine.
    VITE_WALLETCONNECT_PROJECT_ID = "6493cc804b966b9c739a7624c0d21d7c"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 100

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
